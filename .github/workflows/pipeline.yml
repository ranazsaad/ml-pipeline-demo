name: ML Model Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn
    
    - name: Train model
      run: |
        python train.py
    
    - name: Verify output files
      run: |
        echo "Checking output files:"
        ls -la
        echo "model_accuracy.txt content:"
        cat model_accuracy.txt || echo "File not found"
        echo "model_info.txt content:"
        cat model_info.txt || echo "File not found"
        echo "model_data.json content:"
        cat model_data.json || echo "File not found"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: |
          model_info.txt
          model_accuracy.txt
          model_data.json
        retention-days: 1
        if-no-files-found: error

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    if: always() && needs.validate.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: model-artifacts
        path: ./
    
    - name: Verify downloaded files
      run: |
        echo "Downloaded files:"
        ls -la
        echo "model_accuracy.txt content:"
        cat model_accuracy.txt || echo "File not found"
        echo "model_info.txt content:"
        cat model_info.txt || echo "File not found"
        echo "model_data.json content:"
        cat model_data.json || echo "File not found"
    
    - name: Check model accuracy threshold
      run: |
        python check_threshold.py
    
    - name: Mock Docker build
      if: success()
      run: |
        RUN_ID=$(cat model_info.txt 2>/dev/null || echo "unknown")
        echo "🐳 Building Docker image for Run ID: $RUN_ID"
        echo "✅ Docker build completed successfully"