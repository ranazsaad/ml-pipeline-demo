name: ML Model Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train model with MLflow
      run: |
        python train.py
      env:
        MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
    
    - name: Upload model info artifact
      uses: actions/upload-artifact@v4
      with:
        name: model-info
        path: model_info.txt
        retention-days: 1

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    if: always() && needs.validate.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn
    
    - name: Download model info artifact
      uses: actions/download-artifact@v4
      with:
        name: model-info
        path: ./
    
    - name: Check model accuracy threshold
      run: |
        python check_threshold.py
      env:
        MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
    
    - name: Mock Docker build
      if: success()
      run: |
        RUN_ID=$(cat model_info.txt)
        echo "🐳 Building Docker image for Run ID: $RUN_ID"
        echo "✅ Docker build completed successfully"